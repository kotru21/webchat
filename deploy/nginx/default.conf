# SPA + reverse proxy for Secure Chat Lab.
# Proxies /api and /socket.io to the internal `server` service.
# Hostname is resolved at request time via Docker's embedded DNS so nginx
# can start even before the API container is ready.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker Compose embedded DNS.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA security headers (CSP + companions). `always` so they apply on error pages too.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Liveness for the proxy container itself (not the API).
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        set $api_upstream http://server:5000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        # Uploads can be large (message media).
        client_max_body_size 55m;
        proxy_read_timeout 60s;
    }

    location /socket.io/ {
        set $api_upstream http://server:5000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # React Router SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
